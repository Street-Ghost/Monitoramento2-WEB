<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Rastreamento de Embarcações</title>
</head>
<body>
    <div class="position-absolute top-0 start-50 translate-middle-x mt-3 z-1 d-flex justify-content-center w-100">
        <div style="max-width: 300px;" class="input-group">
            <input type="text" class="form-control" id="trackingCode" placeholder="Código de rastreamento">
            <button class="btn btn-primary" id="searchBtn">Rastrear</button>
        </div>
    </div>
    <div id="map"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/mapa.js"></script>
</body>
</html>
